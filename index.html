<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIONEER VALLEY - NPC Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; background-color: #1e293b; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        .glass-panel { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .tool-btn { transition: all 0.2s; }
        .tool-btn.active { background: rgba(59, 130, 246, 0.5); border-color: #60a5fa; }
    </style>
</head>
<body class="text-white select-none">

    <canvas id="gameCanvas"></canvas>

    <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 sm:p-6">
        <div class="glass-panel rounded-2xl p-4 pointer-events-auto w-48">
            <h1 class="font-bold text-blue-300">PIONEER VALLEY</h1>
            <div class="text-sm mt-2">人口: <span id="ui-population">0</span></div>
            <div class="text-xs text-gray-300 mt-2">木材: <span id="ui-wood">0</span> | 石材: <span id="ui-stone">0</span></div>
        </div>

        <div class="flex justify-center w-full mb-4">
            <div class="glass-panel rounded-full p-2 pointer-events-auto flex gap-2">
                <button class="tool-btn active px-4 py-2 rounded-full text-sm" onclick="setTool('gather')" id="btn-gather">採集</button>
                <button class="tool-btn px-4 py-2 rounded-full text-sm" onclick="setTool('house')" id="btn-house">家(木10石5)</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 48;
        const WORLD_SIZE = 50;
        const TILE = { GRASS: 0, TREE: 1, ROCK: 2, HOUSE: 3 };

        let world = [];
        let npcs = [];
        let inventory = { wood: 20, stone: 10, population: 0 };
        let currentTool = 'gather';
        let player = { x: 25, y: 25, renderX: 25*48, renderY: 25*48 };
        let camera = { x: 0, y: 0 };
        let keys = {};

        // 初期化
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // ワールド生成
            for(let y=0; y<WORLD_SIZE; y++){
                world[y] = [];
                for(let x=0; x<WORLD_SIZE; x++){
                    let r = Math.random();
                    world[y][x] = r < 0.1 ? TILE.TREE : (r < 0.15 ? TILE.ROCK : TILE.GRASS);
                }
            }
            world[25][25] = TILE.GRASS; // スポーン地点

            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            canvas.addEventListener('mousedown', handleInteract);

            updateUI();
            gameLoop();
        }

        // インタラクション（プレイヤーの行動 + NPCへの指示）
        function handleInteract(e) {
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - rect.left + camera.x) / TILE_SIZE);
            const gy = Math.floor((e.clientY - rect.top + camera.y) / TILE_SIZE);

            if(gx < 0 || gx >= WORLD_SIZE || gy < 0 || gy >= WORLD_SIZE) return;

            const dist = Math.abs(gx - Math.round(player.x)) + Math.abs(gy - Math.round(player.y));

            if (dist <= 2) {
                // プレイヤーが直接作業
                executeAction(gx, gy);
            } else {
                // 遠くは一番近いNPCに「仕事」として投げる（簡易版）
                const nearestNPC = npcs.find(n => n.state === 'idle');
                if (nearestNPC) {
                    nearestNPC.targetX = gx;
                    nearestNPC.targetY = gy;
                    nearestNPC.state = 'moving';
                }
            }
            updateUI();
        }

        function executeAction(x, y) {
            if (currentTool === 'gather') {
                if (world[y][x] === TILE.TREE) { inventory.wood += 2; world[y][x] = TILE.GRASS; }
                if (world[y][x] === TILE.ROCK) { inventory.stone += 1; world[y][x] = TILE.GRASS; }
            } else if (currentTool === 'house') {
                if (world[y][x] === TILE.GRASS && inventory.wood >= 10 && inventory.stone >= 5) {
                    inventory.wood -= 10; inventory.stone -= 5;
                    world[y][x] = TILE.HOUSE;
                    inventory.population += 2;
                    spawnNPC(x, y); // 家を建てると村人登場
                }
            }
        }

        function spawnNPC(x, y) {
            npcs.push({ x: x, y: y, renderX: x*TILE_SIZE, renderY: y*TILE_SIZE, state: 'idle', targetX: null, targetY: null });
        }

        function update() {
            // プレイヤー移動
            if (keys['w']) player.y -= 0.1;
            if (keys['s']) player.y += 0.1;
            if (keys['a']) player.x -= 0.1;
            if (keys['d']) player.x += 0.1;

            player.renderX = player.x * TILE_SIZE;
            player.renderY = player.y * TILE_SIZE;
            camera.x = player.renderX - canvas.width/2;
            camera.y = player.renderY - canvas.height/2;

            // NPCの動き
            npcs.forEach(npc => {
                if (npc.state === 'moving') {
                    let dx = npc.targetX - npc.x;
                    let dy = npc.targetY - npc.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 0.1) {
                        executeAction(npc.targetX, npc.targetY);
                        npc.state = 'idle';
                    } else {
                        npc.x += dx * 0.05;
                        npc.y += dy * 0.05;
                    }
                }
                npc.renderX = npc.x * TILE_SIZE;
                npc.renderY = npc.y * TILE_SIZE;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // マップ
            for(let y=0; y<WORLD_SIZE; y++) {
                for(let x=0; x<WORLD_SIZE; x++) {
                    if(world[y][x] === TILE.GRASS) ctx.fillStyle = '#34d399';
                    else if(world[y][x] === TILE.TREE) ctx.fillStyle = '#059669';
                    else if(world[y][x] === TILE.ROCK) ctx.fillStyle = '#94a3b8';
                    else if(world[y][x] === TILE.HOUSE) ctx.fillStyle = '#fca5a5';
                    ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE-1, TILE_SIZE-1);
                }
            }

            // NPC
            npcs.forEach(npc => {
                ctx.fillStyle = '#f59e0b';
                ctx.fillRect(npc.renderX+12, npc.renderY+12, 24, 24);
            });

            // プレイヤー
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(player.renderX + TILE_SIZE/2, player.renderY + TILE_SIZE/2, 15, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('ui-wood').innerText = inventory.wood;
            document.getElementById('ui-stone').innerText = inventory.stone;
            document.getElementById('ui-population').innerText = inventory.population;
        }

        window.setTool = (t) => {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
        };

        init();
    </script>
</body>
</html>
